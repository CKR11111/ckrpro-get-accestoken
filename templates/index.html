<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garena Token Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f2f2f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .ios-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        .ios-input { background: #ffffff; border: 1px solid #d1d1d6; border-radius: 12px; padding: 12px; width: 100%; transition: 0.3s; }
        .ios-btn { background: #007aff; color: white; border-radius: 12px; padding: 14px; width: 100%; font-weight: 600; transition: 0.2s; }
        .ios-btn:active { transform: scale(0.98); opacity: 0.9; }
        .terminal-box { background: #1c1c1e; color: #32d74b; font-family: 'Courier New', monospace; border-radius: 15px; padding: 15px; min-height: 150px; font-size: 14px; }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <div class="max-w-md w-full space-y-6">
        <header class="text-center py-4">
            <h1 class="text-3xl font-bold text-gray-900">Garena Pro</h1>
            <p class="text-gray-500">Secure Token Extractor</p>
        </header>

        <div class="ios-card p-6 space-y-4">
            <h2 class="font-semibold text-lg border-b pb-2">Login Credentials</h2>
            <input type="text" id="uid" class="ios-input" placeholder="Garena UID">
            <input type="password" id="password" class="ios-input" placeholder="Password">
            <button onclick="sendData('id_pass')" class="ios-btn">Extract via Credentials</button>
        </div>

        <div class="ios-card p-6 space-y-4">
            <h2 class="font-semibold text-lg border-b pb-2">EAT Token / URL</h2>
            <input type="text" id="eat_data" class="ios-input" placeholder="Paste EAT Token or Login URL">
            <button onclick="sendData('eat_url')" class="ios-btn" style="background: #5856d6;">Convert EAT to Token</button>
        </div>

        <div class="ios-card p-6">
            <h2 class="font-semibold text-gray-700 mb-3">Response Terminal</h2>
            <div id="terminal" class="terminal-box">
                [SYSTEM] Waiting for input...
            </div>
        </div>
    </div>

    <script>
        async function sendData(mode) {
            const term = document.getElementById('terminal');
            term.innerHTML = "> Processing request...";
            
            let bodyData = { mode: mode };
            if(mode === 'id_pass') {
                bodyData.uid = document.getElementById('uid').value;
                bodyData.password = document.getElementById('password').value;
            } else {
                bodyData.data = document.getElementById('eat_data').value;
            }

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(bodyData)
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    term.innerHTML = `<span style="color: #fff">✅ SUCCESS FOUND</span><br>
                                      ID: ${result.uid}<br>
                                      NICK: ${result.nickname}<br>
                                      PLATFORM: ${result.platform}<br><br>
                                      <span style="word-break: break-all;">TOKEN: ${result.token}</span>`;
                } else {
                    term.innerHTML = `<span style="color: #ff453a">❌ ERROR: ${result.message}</span>`;
                }
            } catch (e) {
                term.innerHTML = "❌ Connection Failed!";
            }
        }
    </script>
</body>
</html>
